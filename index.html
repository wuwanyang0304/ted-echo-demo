:root[data-theme=&quot;light&quot;] {
  color-scheme: light;
}

:root[data-theme=&quot;dark&quot;] {
  color-scheme: dark;
}

* {
  box-sizing: border-box;
}

html &gt; body {
  margin: 0;
  padding: 5px;
  color: var(--foreground);
  background: transparent !important;
  font-family: var(--font-sans);
  font-size: var(--font-size-normal);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
}

a {
  color: color-mix(in srgb, var(--viz-accent) 80%, var(--viz-text) 20%);
  cursor: pointer;
  font-weight: var(--viz-font-weight-medium);
  text-decoration: none;
  text-underline-offset: 2px;
}

a:is(:hover, :focus-visible) {
  text-decoration-line: underline;
  text-decoration-style: dashed;
  text-decoration-thickness: 0.5px;
}

h1,
h2,
h3,
h4,
h5,
h6,
p {
  margin-block: 0;
}

h1 {
  font-size: var(--font-size-h1);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

h2 {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

h3,
h4,
h5,
h6 {
  font-size: var(--font-size-h3);
  font-weight: var(--font-weight-medium);
  line-height: 1.3;
}

b,
strong,
th {
  font-weight: var(--font-weight-medium);
}

code:not(pre code) {
  display: inline;
  padding: 1px 6px;
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background: var(--muted);
  font-family: var(--font-mono);
  font-size: 0.92em;
  overflow-wrap: anywhere;
  -webkit-box-decoration-break: clone;
  box-decoration-break: clone;
  word-break: break-word;
}

.table-responsive {
  width: 100%;
  overflow-x: auto;
  scrollbar-width: thin;
}

.table {
  width: 100%;
  border-collapse: collapse;
  color: var(--foreground);
  font: inherit;
  text-align: start;
}

.table :is(th, td) {
  padding-block: 10px;
  padding-inline: 0 24px;
  overflow-wrap: anywhere;
  border-bottom: 1px solid var(--border);
  text-align: start;
  vertical-align: top;
}

.table-responsive &gt; .table :is(th, td) {
  overflow-wrap: break-word;
}

.table :is(th, td):last-child {
  padding-inline-end: 0;
}

.table :is(caption, thead th) {
  font-weight: 600;
}

.table thead th {
  padding-block: 8px;
  border-bottom-color: color-mix(in srgb, var(--foreground) 16%, transparent);
}

.table tbody tr:last-child :is(th, td) {
  border-bottom: 0;
}

.table.table-sm :is(th, td) {
  padding-block: 6px;
}

.table.table-sm :is(th, td):not(:last-child) {
  padding-inline-end: 16px;
}

.table :is(.text-end, [align=&quot;right&quot;]) {
  text-align: end;
  font-variant-numeric: tabular-nums;
}

.table :is(.text-center, [align=&quot;center&quot;]) {
  text-align: center;
}

.table .text-nowrap {
  white-space: nowrap;
}

#widget {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  padding: 0;
  background: transparent !important;
}

.card {
  min-width: 0;
  padding: 12px;
  overflow: hidden;
  overflow-wrap: break-word;
  border-radius: var(--radius-2xl);
  corner-shape: superellipse(1.5);
  color: var(--card-foreground);
  background: var(--card);
}

#widget &gt; :not(.card) {
  width: 100% !important;
  max-width: none !important;
  margin: 0 !important;
  padding: 0 !important;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
}

.tooltip {
  position: fixed;
  z-index: 50;
  top: 0;
  left: 0;
  width: max-content;
  max-width: min(
    20rem,
    var(--tooltip-available-width, calc(100vw - 10px)),
    calc(100vw - 10px)
  );
  max-height: min(
    var(--tooltip-available-height, calc(100vh - 10px)),
    calc(100vh - 10px)
  );
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--popover-foreground);
  background: var(--popover);
  box-shadow: none;
  font-size: var(--font-size-tooltip);
  line-height: var(--line-height-tooltip);
  overflow-wrap: break-word;
  white-space: normal;
  pointer-events: none;
  user-select: none;
}

.viz-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(max(180px, 24%), 1fr));
  gap: 10px;
}

.viz-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.viz-stat-value {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

.viz-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}

.viz-badge {
  padding: 3px 8px;
  border-radius: var(--radius-full);
  color: var(--accent-foreground);
  background: var(--accent);
  font-weight: var(--font-weight-medium);
}

small,
.text-small,
.viz-badge {
  font-size: var(--font-size-small);
  line-height: var(--line-height-small);
}

.text-muted {
  color: var(--muted-foreground);
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.viz-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

.viz-controls &gt; .form-label {
  display: grid;
  min-width: min(100%, 260px);
  flex: 1 1 280px;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: baseline;
  gap: 2px 12px;
  margin-bottom: 0;
}

.viz-controls &gt; .form-label &gt; :is(.form-control, .form-range, .form-select) {
  grid-column: 1 / -1;
}

.btn,
.form-check-input,
.form-control,
.form-range,
.form-select {
  font: inherit;
}

.btn {
  appearance: button;
  display: inline-flex;
  inline-size: fit-content;
  max-inline-size: 100%;
  min-height: 28px;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin: 0;
  padding: 0 8px;
  -webkit-app-region: no-drag;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: var(--cursor-interaction, pointer);
  text-align: center;
  text-decoration: none;
  white-space: nowrap;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

.btn:is(.btn-block, .viz-tile) {
  inline-size: 100%;
}

.btn.viz-tile {
  min-width: 0;
  overflow-wrap: anywhere;
  white-space: normal;
}

a.btn {
  cursor: pointer;
  text-decoration: none;
}

.btn:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn-primary {
  border-color: transparent;
  color: var(--primary-foreground);
  background: var(--foreground);
  background-clip: padding-box;
}

.btn-primary .text-muted {
  color: color-mix(in srgb, var(--primary-foreground) 50%, transparent);
}

.btn-primary:not(:disabled):hover {
  background: color-mix(in srgb, var(--foreground) 80%, transparent);
  background-clip: padding-box;
}

.btn-ghost {
  border-color: transparent;
  color: var(--muted-foreground);
  background: transparent;
}

.btn-ghost:not(:disabled):hover {
  color: var(--foreground);
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

[data-lucide] {
  stroke-width: 1.6;
}

.form-label {
  display: block;
  margin-bottom: 6px;
  color: var(--foreground);
}

.form-control {
  display: block;
  width: 100%;
  min-height: 28px;
  padding: 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background: var(--secondary);
}

.form-control::placeholder {
  color: var(--muted-foreground);
}

.form-control[type=&quot;file&quot;] {
  padding: 0;
  overflow: hidden;
  cursor: var(--cursor-interaction, pointer);
}

.form-control[type=&quot;file&quot;]::file-selector-button {
  min-height: 26px;
  margin-right: 8px;
  padding: 0 8px;
  border: 0;
  border-right: 1px solid var(--input);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: inherit;
  font: inherit;
}

.form-control[type=&quot;file&quot;]:not(:disabled):hover::file-selector-button {
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.form-control-color[type=&quot;color&quot;] {
  width: 40px;
  height: 28px;
  padding: 3px;
  cursor: var(--cursor-interaction, pointer);
}

.form-control-color[type=&quot;color&quot;]::-webkit-color-swatch-wrapper {
  padding: 0;
}

.form-control-color[type=&quot;color&quot;]::-webkit-color-swatch {
  border: 0;
  border-radius: calc(var(--radius-lg) - 4px);
  corner-shape: superellipse(1.5);
}

textarea.form-control {
  height: auto;
  min-height: 72px;
  padding: 8px 10px;
  resize: vertical;
}

.form-control:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-control:disabled,
.form-select:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.form-select {
  appearance: none;
  display: block;
  width: 100%;
  min-height: 28px;
  margin: 0;
  padding: 0 32px 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background-color: var(--secondary);
  background-image:
    linear-gradient(45deg, transparent 50%, var(--muted-foreground) 50%),
    linear-gradient(135deg, var(--muted-foreground) 50%, transparent 50%);
  background-position:
    calc(100% - 14px) 50%,
    calc(100% - 10px) 50%;
  background-repeat: no-repeat;
  background-size: 4px 4px;
  cursor: var(--cursor-interaction, default);
}

.form-select:not(:disabled):hover {
  background-color: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.form-select:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-check {
  display: flex;
  min-height: 20px;
  align-items: center;
  gap: 6px;
}

.form-check-input {
  appearance: none;
  width: 14px;
  height: 14px;
  flex: 0 0 auto;
  margin: 0;
  border: 1px solid var(--input);
  color: var(--primary-foreground);
  background-color: transparent;
  cursor: var(--cursor-interaction, default);
  transition:
    background-color 150ms,
    border-color 150ms,
    box-shadow 150ms;
}

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;] {
  border-color: var(--input);
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background-color: var(--secondary);
  box-shadow: var(--shadow-sm);
}

.form-check:not(.form-switch)
  .form-check-input:not(:disabled):not(:checked):hover {
  background-color: var(--card);
}

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;]:checked {
  border-color: var(--primary);
  background-color: var(--primary);
}

.form-check:not(.form-switch)
  .form-check-input[type=&quot;checkbox&quot;]:checked::before {
  display: block;
  width: 100%;
  height: 100%;
  background: var(--primary-foreground);
  content: &quot;&quot;;
  mask: var(--checkmark-image) center / 12px 12px no-repeat;
}

.form-check-input[type=&quot;radio&quot;] {
  width: 14px;
  height: 14px;
  border-radius: var(--radius-full);
}

.form-check-input[type=&quot;radio&quot;]:checked {
  border: 2px solid var(--primary);
  background:
    radial-gradient(circle, var(--primary-foreground) 0 2.5px, transparent 3px),
    var(--primary);
}

.form-check:not(.form-switch) .form-check-input:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

.form-check:not(.form-switch) .form-check-input:disabled {
  cursor: not-allowed;
  pointer-events: none;
}

.form-check:not(.form-switch) .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
}

.form-switch .form-check-input:disabled,
.form-switch .form-check-input:disabled + .form-check-label {
  cursor: not-allowed;
  opacity: 0.6;
}

.form-check-label {
  color: var(--foreground);
  cursor: var(--cursor-interaction, default);
}

.form-switch .form-check-input {
  position: relative;
  width: 32px;
  height: 20px;
  border: 0;
  border-radius: var(--radius-full);
  background: var(--muted);
  box-shadow: none;
  transition: background-color 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input::before {
  position: absolute;
  top: 50%;
  left: 0;
  width: 16px;
  height: 16px;
  box-sizing: border-box;
  border: 1px solid light-dark(var(--primary-foreground), var(--foreground));
  border-radius: var(--radius-full);

}

.form-switch .form-check-input:checked {

}

.form-switch .form-check-input:checked::before {

}

}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;

  border-radius: var(--radius-full);

}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);

}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {

}

.btn:not(.btn-primary, .viz-tile):is(

    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {

}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

    &lt;section class=&quot;echo-screen&quot; data-screen=&quot;1&quot;&gt;
      &lt;p class=&quot;echo-kicker&quot;&gt;AI 多视角刺激&lt;/p&gt;
      &lt;h2&gt;选择一个思考入口，或跳过提示直接表达&lt;/h2&gt;
      &lt;p class=&quot;echo-lead&quot;&gt;提示卡提供角度、关键词和追问，不替用户生成标准观点。&lt;/p&gt;
      &lt;div class=&quot;echo-choice-list&quot; role=&quot;group&quot; aria-label=&quot;观点视角选择&quot;&gt;
        &lt;button type=&quot;button&quot; class=&quot;echo-choice&quot; data-perspective=&quot;支持&quot;&gt;
          &lt;span class=&quot;echo-choice-head&quot;&gt;&lt;i data-lucide=&quot;thumbs-up&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;支持视角&lt;/span&gt;
          &lt;p&gt;AI 能快速补充信息、发现盲点，可能让人把精力留给更重要的判断。&lt;/p&gt;
          &lt;span class=&quot;echo-keywords&quot;&gt;&lt;span class=&quot;viz-badge&quot;&gt;效率&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;赋能&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;人机协作&lt;/span&gt;&lt;/span&gt;
        &lt;/button&gt;
        &lt;button type=&quot;button&quot; class=&quot;echo-choice is-selected&quot; data-perspective=&quot;质疑&quot;&gt;
          &lt;span class=&quot;echo-choice-head&quot;&gt;&lt;i data-lucide=&quot;scale&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;质疑视角&lt;/span&gt;
          &lt;p&gt;如果每次都先问 AI，我们会不会逐渐失去独立构建问题和验证答案的耐心？&lt;/p&gt;
          &lt;span class=&quot;echo-keywords&quot;&gt;&lt;span class=&quot;viz-badge&quot;&gt;依赖&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;惰性&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;责任&lt;/span&gt;&lt;/span&gt;
        &lt;/button&gt;
        &lt;button type=&quot;button&quot; class=&quot;echo-choice&quot; data-perspective=&quot;因果&quot;&gt;
          &lt;span class=&quot;echo-choice-head&quot;&gt;&lt;i data-lucide=&quot;git-branch&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;因果拆解&lt;/span&gt;
          &lt;p&gt;人的思考变化究竟来自 AI 本身，还是学校规则、使用顺序与评价方式？&lt;/p&gt;
          &lt;span class=&quot;echo-keywords&quot;&gt;&lt;span class=&quot;viz-badge&quot;&gt;原因&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;结果&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;边界&lt;/span&gt;&lt;/span&gt;
        &lt;/button&gt;
        &lt;button type=&quot;button&quot; class=&quot;echo-choice&quot; data-perspective=&quot;经历&quot;&gt;
          &lt;span class=&quot;echo-choice-head&quot;&gt;&lt;i data-lucide=&quot;notebook-pen&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;个人经历&lt;/span&gt;
          &lt;p&gt;回想一次你用 AI 完成学习任务的经历：它在哪一步帮助或妨碍了你？&lt;/p&gt;
          &lt;span class=&quot;echo-keywords&quot;&gt;&lt;span class=&quot;viz-badge&quot;&gt;课堂&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;作业&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;选择&lt;/span&gt;&lt;/span&gt;
        &lt;/button&gt;
        &lt;button type=&quot;button&quot; class=&quot;echo-choice&quot; data-perspective=&quot;角色&quot;&gt;
          &lt;span class=&quot;echo-choice-head&quot;&gt;&lt;i data-lucide=&quot;users&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;角色视角&lt;/span&gt;
          &lt;p&gt;学生、教师、家长和 AI 平台，会如何定义“合理使用”与“独立完成”？&lt;/p&gt;
          &lt;span class=&quot;echo-keywords&quot;&gt;&lt;span class=&quot;viz-badge&quot;&gt;学生&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;教师&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;平台&lt;/span&gt;&lt;/span&gt;
        &lt;/button&gt;
        &lt;button type=&quot;button&quot; class=&quot;echo-choice&quot; data-perspective=&quot;未来&quot;&gt;
          &lt;span class=&quot;echo-choice-head&quot;&gt;&lt;i data-lucide=&quot;telescope&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;未来情境&lt;/span&gt;
          &lt;p&gt;五年后，当 AI 成为默认学习伙伴，哪些能力必须由人独立保留？&lt;/p&gt;
          &lt;span class=&quot;echo-keywords&quot;&gt;&lt;span class=&quot;viz-badge&quot;&gt;五年后&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;规则&lt;/span&gt;&lt;span class=&quot;viz-badge&quot;&gt;核心能力&lt;/span&gt;&lt;/span&gt;
        &lt;/button&gt;
      &lt;/div&gt;
      &lt;div class=&quot;card echo-selected-detail&quot;&gt;
        &lt;strong id=&quot;echo-selected-detail-title&quot;&gt;质疑视角&lt;/strong&gt;
        &lt;p id=&quot;echo-selected-detail-text&quot; style=&quot;margin:6px 0 0&quot;&gt;如果每次都先问 AI，我们会不会逐渐失去独立构建问题和验证答案的耐心？&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;echo-actions&quot;&gt;
        &lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-back&gt;返回&lt;/button&gt;
        &lt;button type=&quot;button&quot; class=&quot;btn&quot; id=&quot;echo-random-prompt&quot;&gt;&lt;i data-lucide=&quot;shuffle&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; 随机视角&lt;/button&gt;

    &lt;section class=&quot;echo-screen&quot; data-screen=&quot;2&quot;&gt;
      &lt;p class=&quot;echo-kicker&quot;&gt;60 秒 My Talk&lt;/p&gt;
      &lt;h2&gt;先说出你最想让别人记住的一句话&lt;/h2&gt;
      &lt;p class=&quot;echo-prompt&quot; id=&quot;echo-selected-prompt&quot;&gt;质疑视角：AI 越方便，人是否越容易放弃主动判断？&lt;/p&gt;
      &lt;div class=&quot;viz-controls echo-mode-switch&quot; role=&quot;group&quot; aria-label=&quot;表达方式&quot;&gt;
        &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-input-mode=&quot;text&quot; aria-pressed=&quot;true&quot;&gt;&lt;i data-lucide=&quot;keyboard&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; 文字输入&lt;/button&gt;
        &lt;button type=&quot;button&quot; class=&quot;btn&quot; data-input-mode=&quot;voice&quot; aria-pressed=&quot;false&quot;&gt;&lt;i data-lucide=&quot;mic&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; 语音输入&lt;/button&gt;
      &lt;/div&gt;

      &lt;div class=&quot;echo-input-panel&quot; id=&quot;echo-text-panel&quot;&gt;
        &lt;div class=&quot;echo-field&quot;&gt;
          &lt;label class=&quot;form-label&quot; for=&quot;echo-talk-input&quot;&gt;我的观点&lt;/label&gt;
          &lt;textarea class=&quot;form-control&quot; id=&quot;echo-talk-input&quot;&gt;我认为 AI 不会直接让人失去思考能力，真正的风险是我们把“得到答案”误认为“完成思考”。例如做课程作业时，如果我先让 AI 生成整篇内容，最后很难解释自己的选择；但如果先写出判断，再让 AI 找反例，它反而能帮助我想得更完整。&lt;/textarea&gt;
          &lt;div class=&quot;echo-counter&quot;&gt;&lt;span id=&quot;echo-char-count&quot;&gt;0&lt;/span&gt; 字 · 建议 60—180 字&lt;/div&gt;
        &lt;/div&gt;

        &lt;details class=&quot;echo-ai-summary echo-prediction-card&quot; id=&quot;echo-prediction-card&quot;&gt;
          &lt;summary&gt;&lt;i data-lucide=&quot;scan-text&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; AI 从你的表达中看到了……&lt;/summary&gt;
          &lt;div class=&quot;echo-peer-head&quot; style=&quot;margin-top:12px&quot;&gt;&lt;strong&gt;表达摘要&lt;/strong&gt;&lt;span class=&quot;viz-badge&quot; id=&quot;echo-prediction-confidence&quot;&gt;AI 总结 · 模拟&lt;/span&gt;&lt;/div&gt;
          &lt;p class=&quot;echo-viewpoint&quot; id=&quot;echo-prediction-stance&quot;&gt;你的立场是：AI 不会直接削弱思考，关键在于使用顺序。&lt;/p&gt;
          &lt;p class=&quot;echo-evidence&quot; id=&quot;echo-prediction-reason&quot;&gt;核心理由：先形成判断再找 AI 验证，比让 AI 直接代写更能保留主动性。&lt;/p&gt;
          &lt;div class=&quot;echo-extra-angle&quot; id=&quot;echo-extra-angle&quot; hidden&gt;&lt;strong&gt;一个可能遗漏的角度&lt;/strong&gt;&lt;p style=&quot;margin:5px 0 0&quot;&gt;除了个人使用顺序，还可以讨论学校如何设计作业规则，证明学生先进行了独立判断。&lt;/p&gt;&lt;/div&gt;
          &lt;div class=&quot;echo-actions&quot;&gt;
            &lt;button type=&quot;button&quot; class=&quot;btn&quot; id=&quot;echo-accept-prediction&quot;&gt;这份总结准确&lt;/button&gt;
            &lt;button type=&quot;button&quot; class=&quot;btn&quot; id=&quot;echo-add-angle&quot;&gt;帮我补充遗漏的角度&lt;/button&gt;
            &lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; id=&quot;echo-ignore-prediction&quot;&gt;关闭本次总结&lt;/button&gt;
          &lt;/div&gt;
          &lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; id=&quot;echo-disable-prediction&quot;&gt;以后不主动显示&lt;/button&gt;
        &lt;/details&gt;
      &lt;/div&gt;

      &lt;div class=&quot;echo-input-panel echo-voice-panel&quot; id=&quot;echo-voice-panel&quot; hidden&gt;
        &lt;div class=&quot;echo-field&quot;&gt;
          &lt;label class=&quot;form-label&quot; for=&quot;echo-voice-language&quot;&gt;表达语言&lt;/label&gt;
          &lt;select class=&quot;form-select&quot; id=&quot;echo-voice-language&quot;&gt;&lt;option&gt;English&lt;/option&gt;&lt;option&gt;中文&lt;/option&gt;&lt;/select&gt;
        &lt;/div&gt;
        &lt;button type=&quot;button&quot; class=&quot;btn btn-primary btn-block&quot; id=&quot;echo-voice-btn&quot;&gt;&lt;i data-lucide=&quot;mic&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; 开始模拟录音&lt;/button&gt;
        &lt;div class=&quot;echo-voice-status&quot;&gt;&lt;i data-lucide=&quot;audio-waveform&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;&lt;span id=&quot;echo-voice-status-text&quot;&gt;语音模式不显示观点预测卡，避免打断自然表达。&lt;/span&gt;&lt;/div&gt;
        &lt;details class=&quot;echo-voice-result&quot; id=&quot;echo-voice-result&quot; hidden&gt;
          &lt;summary&gt;查看口语评估（可选）&lt;/summary&gt;
          &lt;p class=&quot;text-small text-muted&quot; style=&quot;margin-top:10px&quot;&gt;本功能仅供口语练习参考，不影响观点质量判断。&lt;/p&gt;
          &lt;div class=&quot;echo-voice-score-grid&quot;&gt;
            &lt;div class=&quot;echo-voice-score&quot;&gt;&lt;strong&gt;82 / 100&lt;/strong&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;发音&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;echo-voice-score&quot;&gt;&lt;strong&gt;76 / 100&lt;/strong&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;流利度&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;echo-voice-score&quot;&gt;&lt;strong&gt;71 / 100&lt;/strong&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;重音节奏&lt;/span&gt;&lt;/div&gt;
          &lt;/div&gt;
          &lt;table class=&quot;table table-sm&quot; aria-label=&quot;发音纠正示例&quot;&gt;
            &lt;thead&gt;&lt;tr&gt;&lt;th&gt;词语&lt;/th&gt;&lt;th&gt;问题&lt;/th&gt;&lt;th&gt;纠正建议&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
            &lt;tbody&gt;&lt;tr&gt;&lt;td&gt;independent&lt;/td&gt;&lt;td&gt;重音偏后&lt;/td&gt;&lt;td&gt;重读第三音节 pen&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;evidence&lt;/td&gt;&lt;td&gt;尾音不清晰&lt;/td&gt;&lt;td&gt;放慢 den-ce 的收尾&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;
          &lt;/table&gt;
          &lt;p class=&quot;text-small text-muted&quot;&gt;语音评分为原型模拟；正式版本需由语音识别与发音评测能力实现。&lt;/p&gt;
        &lt;/details&gt;
      &lt;/div&gt;
      &lt;div class=&quot;echo-actions&quot;&gt;
        &lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-back&gt;返回&lt;/button&gt;
        &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-next&gt;让 AI 帮我整理&lt;/button&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;echo-screen&quot; data-screen=&quot;3&quot;&gt;
      &lt;p class=&quot;echo-kicker&quot;&gt;观点结构化&lt;/p&gt;
      &lt;h2&gt;这是你的观点，不是 AI 替你写的答案&lt;/h2&gt;
      &lt;div class=&quot;echo-ai-note&quot;&gt;
        &lt;i data-lucide=&quot;sparkles&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;
        &lt;span&gt;&lt;strong&gt;AI 模拟结果&lt;/strong&gt;&lt;br&gt;入围后拟使用赛事开放的飞书 AI 能力，且必须由用户确认或修改。&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;echo-structure&quot;&gt;
        &lt;div class=&quot;echo-structure-row&quot;&gt;
          &lt;span class=&quot;echo-structure-key&quot;&gt;立场&lt;/span&gt;
          &lt;p class=&quot;echo-structure-value&quot;&gt;AI 本身不会取消思考，错误的使用顺序才会。&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;echo-structure-row&quot;&gt;
          &lt;span class=&quot;echo-structure-key&quot;&gt;理由&lt;/span&gt;
          &lt;p class=&quot;echo-structure-value&quot;&gt;把得到答案当作完成思考，会跳过自主判断和验证。&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;echo-structure-row&quot;&gt;
          &lt;span class=&quot;echo-structure-key&quot;&gt;例子&lt;/span&gt;
          &lt;p class=&quot;echo-structure-value&quot;&gt;先让 AI 完成课程作业后，自己难以解释内容选择。&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;echo-structure-row&quot;&gt;
          &lt;span class=&quot;echo-structure-key&quot;&gt;问题&lt;/span&gt;
          &lt;p class=&quot;echo-structure-value&quot;&gt;怎样使用 AI，才能保留自主判断又获得效率？&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;echo-actions&quot;&gt;
        &lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-back&gt;返回修改&lt;/button&gt;
        &lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-next&gt;确认，这是我的意思&lt;/button&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section class=&quot;echo-screen&quot; data-screen=&quot;4&quot;&gt;
      &lt;p class=&quot;echo-kicker&quot;&gt;真实观点回应&lt;/p&gt;
      &lt;h2&gt;先看观点分布，再选择你想回应的人&lt;/h2&gt;
      &lt;p class=&quot;echo-lead&quot;&gt;AI 只分析已授权观点的立场占比并辅助匹配，不生成或冒充真实同伴。&lt;/p&gt;

        &lt;/label&gt;
      &lt;/div&gt;
      &lt;button type=&quot;button&quot; class=&quot;btn btn-primary btn-block&quot; id=&quot;echo-save-btn&quot;&gt;保存本次设置&lt;/button&gt;
      &lt;div class=&quot;echo-toast&quot; id=&quot;echo-toast&quot; role=&quot;status&quot;&gt;已保存。当前分享范围：仅自己可见。&lt;/div&gt;
      &lt;/details&gt;
      &lt;div class=&quot;echo-actions&quot;&gt;
        &lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-back&gt;返回总结&lt;/button&gt;
        &lt;button type=&quot;button&quot; class=&quot;btn&quot; id=&quot;echo-restart-btn&quot;&gt;&lt;i data-lucide=&quot;rotate-ccw&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; 重新体验&lt;/button&gt;
      &lt;/div&gt;
    &lt;/section&gt;
&lt;/main&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;ted-echo-optimized-prototype&#x27;);
      if (!root) return;

      const screens = Array.from(root.querySelectorAll(&#x27;.echo-screen&#x27;));
      const progressFill = root.querySelector(&#x27;#echo-progress-fill&#x27;);
      const stepLabel = root.querySelector(&#x27;#echo-step-label&#x27;);
      const talkInput = root.querySelector(&#x27;#echo-talk-input&#x27;);
      const charCount = root.querySelector(&#x27;#echo-char-count&#x27;);
      const selectedPrompt = root.querySelector(&#x27;#echo-selected-prompt&#x27;);
      const selectedDetailTitle = root.querySelector(&#x27;#echo-selected-detail-title&#x27;);
      const selectedDetailText = root.querySelector(&#x27;#echo-selected-detail-text&#x27;);
      const textPanel = root.querySelector(&#x27;#echo-text-panel&#x27;);
      const voicePanel = root.querySelector(&#x27;#echo-voice-panel&#x27;);
      const predictionCard = root.querySelector(&#x27;#echo-prediction-card&#x27;);
      const predictionStance = root.querySelector(&#x27;#echo-prediction-stance&#x27;);
      const predictionReason = root.querySelector(&#x27;#echo-prediction-reason&#x27;);
      const predictionConfidence = root.querySelector(&#x27;#echo-prediction-confidence&#x27;);
      const voiceResult = root.querySelector(&#x27;#echo-voice-result&#x27;);
      const voiceStatusText = root.querySelector(&#x27;#echo-voice-status-text&#x27;);
      const responseInput = root.querySelector(&#x27;#echo-response-input&#x27;);
      const responseLabel = root.querySelector(&#x27;#echo-response-label&#x27;);
      const summaryDisagreement = root.querySelector(&#x27;#echo-summary-disagreement&#x27;);
      const summaryEvidence = root.querySelector(&#x27;#echo-summary-evidence&#x27;);
      const historyPerspective = root.querySelector(&#x27;#echo-history-perspective&#x27;);
      const historyView = root.querySelector(&#x27;#echo-history-view&#x27;);
      const toast = root.querySelector(&#x27;#echo-toast&#x27;);
      const rationalMarker = root.querySelector(&#x27;#echo-rational-marker&#x27;);
      const evidenceMarker = root.querySelector(&#x27;#echo-evidence-marker&#x27;);
      const openMarker = root.querySelector(&#x27;#echo-open-marker&#x27;);
      const activeMarker = root.querySelector(&#x27;#echo-active-marker&#x27;);
      const rationalValue = root.querySelector(&#x27;#echo-rational-value&#x27;);
      const evidenceValue = root.querySelector(&#x27;#echo-evidence-value&#x27;);
      const openValue = root.querySelector(&#x27;#echo-open-value&#x27;);
      const activeValue = root.querySelector(&#x27;#echo-active-value&#x27;);
      const personalAnalysis = root.querySelector(&#x27;#echo-personal-analysis&#x27;);
      const feedbackStatus = root.querySelector(&#x27;#echo-feedback-status&#x27;);
      let current = 0;
      let perspective = &#x27;质疑&#x27;;
      let profileFeedback = &#x27;&#x27;;
      let inputMode = &#x27;text&#x27;;
      let selectedPeer = &#x27;反方&#x27;;
      let predictionIgnored = false;
      let aiSummaryDisabled = false;
      let favorite = false;

      const prompts = {
        &#x27;支持&#x27;: &#x27;支持视角：AI 是否能把人的精力留给更重要的判断？&#x27;,
        &#x27;质疑&#x27;: &#x27;质疑视角：AI 越方便，人是否越容易放弃主动判断？&#x27;,
        &#x27;因果&#x27;: &#x27;因果拆解：思考变化来自工具，还是来自使用规则与评价方式？&#x27;,
        &#x27;经历&#x27;: &#x27;个人经历：回想一次 AI 真正帮助或妨碍你思考的经历。&#x27;,
        &#x27;角色&#x27;: &#x27;角色视角：学生、教师和平台会如何定义合理使用？&#x27;,
        &#x27;未来&#x27;: &#x27;未来情境：AI 成为默认伙伴后，人必须保留哪些能力？&#x27;,
        &#x27;自由表达&#x27;: &#x27;自由表达：不用参考提示卡，直接写下你自己的判断。&#x27;
      };

      const promptDetails = {
        &#x27;支持&#x27;: &#x27;AI 能快速补充信息、发现盲点，可能让人把精力留给更重要的判断。&#x27;,
        &#x27;质疑&#x27;: &#x27;如果每次都先问 AI，我们会不会逐渐失去独立构建问题和验证答案的耐心？&#x27;,
        &#x27;因果&#x27;: &#x27;人的思考变化究竟来自 AI 本身，还是学校规则、使用顺序与评价方式？&#x27;,
        &#x27;经历&#x27;: &#x27;回想一次你用 AI 完成学习任务的经历：它在哪一步帮助或妨碍了你？&#x27;,
        &#x27;角色&#x27;: &#x27;学生、教师、家长和 AI 平台，会如何定义合理使用与独立完成？&#x27;,
        &#x27;未来&#x27;: &#x27;五年后，当 AI 成为默认学习伙伴，哪些能力必须由人独立保留？&#x27;,
        &#x27;自由表达&#x27;: &#x27;不使用任何提示卡，保留你自己的问题结构和表达顺序。&#x27;
      };

      const peerResponses = {
        &#x27;正方&#x27;: {
          response: &#x27;我认可 AI 能节省检索时间，但效率只有在使用者先明确问题时才有意义，否则可能只是更快地接受第一个答案。&#x27;,
          disagreement: &#x27;双方都认可 AI 可以提升效率，分歧在于效率是否会自然转化为更深入的判断。&#x27;,
          evidence: &#x27;你使用课程作业经历说明代写风险；对方以检索和比较材料的效率作为依据。&#x27;
        },
        &#x27;反方&#x27;: {
          response: &#x27;我同意便利会改变习惯，但问题不只是工具本身。学校可以要求学生先提交自己的判断和证据，再使用 AI 找反例，这样 AI 也可能成为思考训练的一部分。&#x27;,
          disagreement: &#x27;一方认为风险主要来自错误的使用顺序，另一方认为便利本身就会改变多数人的行为。&#x27;,
          evidence: &#x27;你使用课程作业经历作为证据；对方使用工具长期塑造习惯的判断作为证据。&#x27;
        },
        &#x27;其它&#x27;: {
          response: &#x27;我赞同按任务区分规则。还可以要求用户说明 AI 在哪一步参与，让“使用 AI”从隐蔽行为变成可以讨论和评价的过程。&#x27;,
          disagreement: &#x27;双方都反对简单禁止或放任 AI，差异在于你更强调使用顺序，对方更强调按任务划分规则。&#x27;,
          evidence: &#x27;你以个人作业经历为证据；对方通过头脑风暴与能力考核的任务差异进行论证。&#x27;
        }
      };

      function saveState() {
        const state = { current, perspective, talk: talkInput.value, profileFeedback, inputMode, selectedPeer, aiSummaryDisabled, favorite };
        try { localStorage.setItem(&#x27;tedEchoPrototype&#x27;, JSON.stringify(state)); } catch (error) { /* local preview may restrict storage */ }
      }

      function countSignals(text, words) {
        return words.reduce((total, word) =&gt; total + (text.includes(word) ? 1 : 0), 0);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function updateProfile() {
        const text = `${talkInput.value} ${root.querySelector(&#x27;#echo-response-input&#x27;).value}`;
        const rationalSignals = countSignals(text, [&#x27;因为&#x27;, &#x27;风险&#x27;, &#x27;判断&#x27;, &#x27;规则&#x27;, &#x27;验证&#x27;, &#x27;解释&#x27;, &#x27;如果&#x27;, &#x27;但&#x27;]);
        const emotionalSignals = countSignals(text, [&#x27;感觉&#x27;, &#x27;担心&#x27;, &#x27;喜欢&#x27;, &#x27;害怕&#x27;, &#x27;触动&#x27;, &#x27;共鸣&#x27;, &#x27;失望&#x27;]);
        const evidenceSignals = countSignals(text, [&#x27;例如&#x27;, &#x27;比如&#x27;, &#x27;经历&#x27;, &#x27;作业&#x27;, &#x27;事实&#x27;, &#x27;数据&#x27;, &#x27;证据&#x27;]);
        const intuitionSignals = countSignals(text, [&#x27;我觉得&#x27;, &#x27;直觉&#x27;, &#x27;好像&#x27;, &#x27;可能&#x27;]);
        const openSignals = countSignals(text, [&#x27;同意&#x27;, &#x27;但是&#x27;, &#x27;但&#x27;, &#x27;同时&#x27;, &#x27;反例&#x27;, &#x27;部分&#x27;, &#x27;可以&#x27;]);
        const certaintySignals = countSignals(text, [&#x27;一定&#x27;, &#x27;完全&#x27;, &#x27;必然&#x27;, &#x27;肯定&#x27;]);

        const rationalScore = clamp(52 + rationalSignals * 4 - emotionalSignals * 5, 28, 84);
        const evidenceScore = clamp(48 + evidenceSignals * 6 - intuitionSignals * 3, 25, 82);
        const openScore = clamp(50 + openSignals * 5 - certaintySignals * 7, 25, 86);
        const activeScore = 63;

        rationalMarker.style.left = `${rationalScore}%`;
        evidenceMarker.style.left = `${evidenceScore}%`;
        openMarker.style.left = `${openScore}%`;
        activeMarker.style.left = `${activeScore}%`;
        rationalValue.textContent = rationalScore &gt;= 62 ? &#x27;偏理性推演&#x27; : rationalScore &lt;= 42 ? &#x27;偏感性体验&#x27; : &#x27;理性与感受并用&#x27;;
        evidenceValue.textContent = evidenceScore &gt;= 62 ? &#x27;偏证据推理&#x27; : evidenceScore &lt;= 42 ? &#x27;偏直觉判断&#x27; : &#x27;经验与证据并用&#x27;;
        openValue.textContent = openScore &gt;= 62 ? &#x27;愿意修正观点&#x27; : openScore &lt;= 42 ? &#x27;倾向快速定论&#x27; : &#x27;立场相对平衡&#x27;;
        activeValue.textContent = activeScore &gt;= 62 ? &#x27;会主动发起&#x27; : activeScore &lt;= 42 ? &#x27;更偏被动回应&#x27; : &#x27;主动性正在形成&#x27;;

        const opening = rationalScore &gt;= 62
          ? &#x27;你更倾向先进行理性拆解，再判断工具与使用方式分别承担什么责任。&#x27;
          : rationalScore &lt;= 42
            ? &#x27;你更习惯从个人感受和真实体验进入问题，再逐步形成判断。&#x27;
            : &#x27;你会在个人感受与逻辑拆解之间来回校准，而不是只依赖一种判断方式。&#x27;;
        const basis = evidenceScore &gt;= 62
          ? &#x27;你主动使用了课程作业经历作为依据，使观点不只停留在态度层面。&#x27;
          : &#x27;你已经表达了明确倾向，但还可以增加具体经历、事实或数据作为支撑。&#x27;;
        const dialogue = openScore &gt;= 62
          ? &#x27;回应不同意见时，你选择部分认同并提出改进规则，表现出较强的观点修正意愿。&#x27;
          : &#x27;回应不同意见时，你较快守住了原立场；下一次可以先准确复述对方理由，再决定是否调整。&#x27;;
        personalAnalysis.textContent = `你呈现出“${rationalValue.textContent}、${evidenceValue.textContent}、${openValue.textContent}”的倾向。建议下一次补充一条外部事实或反例。`;
      }

      function showScreen(index) {
        current = Math.max(0, Math.min(index, screens.length - 1));
        screens.forEach((screen, i) =&gt; screen.classList.toggle(&#x27;is-active&#x27;, i === current));
        progressFill.style.width = `${((current + 1) / screens.length) * 100}%`;
        stepLabel.textContent = `${current + 1} / ${screens.length}`;
        historyPerspective.textContent = perspective;
        if (talkInput.value.trim()) {
          const shortView = talkInput.value.trim().split(/[。！？]/)[0];
          historyView.textContent = `${shortView}。`;
        }
        if (screens[current].querySelector(&#x27;#echo-personal-analysis&#x27;)) updateProfile();
        saveState();
        root.scrollIntoView({ behavior: &#x27;smooth&#x27;, block: &#x27;start&#x27; });
      }

      root.querySelectorAll(&#x27;[data-next]&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; showScreen(current + 1));
      });

      root.querySelectorAll(&#x27;[data-back]&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; showScreen(current - 1));
      });

      root.querySelectorAll(&#x27;[data-perspective]&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; {
          perspective = button.dataset.perspective;
          root.querySelectorAll(&#x27;[data-perspective]&#x27;).forEach((item) =&gt; item.classList.toggle(&#x27;is-selected&#x27;, item === button));
          selectedPrompt.textContent = prompts[perspective];
          selectedDetailTitle.textContent = `${perspective}视角`;
          selectedDetailText.textContent = promptDetails[perspective];
          historyPerspective.textContent = perspective;
          saveState();
        });
      });

      root.querySelector(&#x27;#echo-random-prompt&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        const cards = Array.from(root.querySelectorAll(&#x27;[data-perspective]&#x27;));
        const currentIndex = cards.findIndex((item) =&gt; item.dataset.perspective === perspective);
        const nextCard = cards[(currentIndex + 2 + Math.floor(Math.random() * (cards.length - 1))) % cards.length];
        nextCard.click();
      });

      root.querySelector(&#x27;#echo-skip-prompt&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        perspective = &#x27;自由表达&#x27;;
        root.querySelectorAll(&#x27;[data-perspective]&#x27;).forEach((item) =&gt; item.classList.remove(&#x27;is-selected&#x27;));
        selectedPrompt.textContent = prompts[perspective];
        selectedDetailTitle.textContent = &#x27;自由表达&#x27;;
        selectedDetailText.textContent = promptDetails[perspective];
        historyPerspective.textContent = perspective;
        saveState();
        showScreen(current + 1);
      });

      function setInputMode(mode) {
        inputMode = mode;
        textPanel.hidden = mode !== &#x27;text&#x27;;
        voicePanel.hidden = mode !== &#x27;voice&#x27;;
        root.querySelectorAll(&#x27;[data-input-mode]&#x27;).forEach((button) =&gt; button.setAttribute(&#x27;aria-pressed&#x27;, String(button.dataset.inputMode === mode)));
        if (mode === &#x27;voice&#x27;) predictionCard.hidden = true;
        else updatePrediction();
        saveState();
      }

      root.querySelectorAll(&#x27;[data-input-mode]&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; setInputMode(button.dataset.inputMode));
      });

      function updatePrediction() {
        const text = talkInput.value.trim();
        if (inputMode !== &#x27;text&#x27; || predictionIgnored || aiSummaryDisabled || text.length &lt; 12) {
          predictionCard.hidden = true;
          return;
        }
        predictionCard.hidden = false;
        if ((text.includes(&#x27;不会&#x27;) || text.includes(&#x27;不只是&#x27;)) &amp;&amp; (text.includes(&#x27;风险&#x27;) || text.includes(&#x27;顺序&#x27;) || text.includes(&#x27;方式&#x27;))) {
          predictionStance.textContent = &#x27;你的立场是：AI 不会直接削弱思考，关键在于使用顺序与学习规则。&#x27;;
          predictionReason.textContent = &#x27;核心理由：先形成判断再找 AI 验证，比让 AI 直接代写更能保留主动性。&#x27;;
        } else if (text.includes(&#x27;依赖&#x27;) || text.includes(&#x27;削弱&#x27;) || text.includes(&#x27;失去&#x27;)) {
          predictionStance.textContent = &#x27;你的立场是：AI 的便利会逐渐削弱人的主动判断。&#x27;;
          predictionReason.textContent = &#x27;核心理由：快速答案会改变学习习惯，使人减少独立构建问题和验证证据的机会。&#x27;;
        } else {
          predictionStance.textContent = &#x27;你的立场是：AI 可以帮助思考，但需要清晰的使用边界。&#x27;;
          predictionReason.textContent = &#x27;核心理由：AI 适合扩展材料和反例，不应代替用户决定立场。&#x27;;
        }
        predictionConfidence.textContent = &#x27;AI 总结 · 模拟&#x27;;
      }

      function updateCount() { charCount.textContent = talkInput.value.length; }
      talkInput.addEventListener(&#x27;input&#x27;, () =&gt; { updateCount(); updatePrediction(); saveState(); });
      updateCount();

      root.querySelector(&#x27;#echo-accept-prediction&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        predictionConfidence.textContent = &#x27;用户已确认&#x27;;
        root.querySelector(&#x27;#echo-accept-prediction&#x27;).disabled = true;
      });

      root.querySelector(&#x27;#echo-ignore-prediction&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        predictionIgnored = true;
        predictionCard.hidden = true;
      });

      root.querySelector(&#x27;#echo-disable-prediction&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        aiSummaryDisabled = true;
        predictionCard.hidden = true;
        saveState();
      });

      root.querySelector(&#x27;#echo-add-angle&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        root.querySelector(&#x27;#echo-extra-angle&#x27;).hidden = false;
      });

      root.querySelector(&#x27;#echo-voice-btn&#x27;).addEventListener(&#x27;click&#x27;, (event) =&gt; {
        event.currentTarget.innerHTML = &#x27;&lt;i data-lucide=&quot;check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; 模拟录音已完成&#x27;;
        event.currentTarget.disabled = true;
        voiceStatusText.textContent = &#x27;已完成语音分析。观点预测卡在语音模式下保持关闭。&#x27;;
        voiceResult.hidden = false;
        if (window.lucide) window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
      });

      root.querySelectorAll(&#x27;[data-peer-view]&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; {
          selectedPeer = button.dataset.peerView;
          root.querySelectorAll(&#x27;[data-peer-view]&#x27;).forEach((item) =&gt; item.classList.toggle(&#x27;is-selected&#x27;, item === button));
          responseLabel.textContent = `我选择回应：${selectedPeer}观点`;
          responseInput.value = peerResponses[selectedPeer].response;
          summaryDisagreement.textContent = peerResponses[selectedPeer].disagreement;
          summaryEvidence.textContent = peerResponses[selectedPeer].evidence;
          saveState();
        });
      });

      root.querySelectorAll(&#x27;[data-peer-filter]&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; {
          const filter = button.dataset.peerFilter;
          root.querySelectorAll(&#x27;[data-peer-filter]&#x27;).forEach((item) =&gt; item.setAttribute(&#x27;aria-pressed&#x27;, String(item === button)));
          root.querySelectorAll(&#x27;[data-peer-view]&#x27;).forEach((item) =&gt; {
            item.hidden = filter !== &#x27;全部&#x27; &amp;&amp; item.dataset.peerFilterType !== filter;
          });
        });
      });

      root.querySelector(&#x27;#echo-refresh-peers&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        const list = root.querySelector(&#x27;[aria-label=&quot;选择要回应的观点&quot;]&#x27;);
        const peers = Array.from(list.querySelectorAll(&#x27;[data-peer-view]&#x27;));
        if (peers.length) list.appendChild(peers[0]);
        root.querySelector(&#x27;#echo-peer-source-note&#x27;).textContent = &#x27;已刷新一组内测种子观点（模拟）。正式测试后替换为经授权的真实学员观点。&#x27;;
      });

      root.querySelectorAll(&#x27;[data-topic]&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; {
          root.querySelectorAll(&#x27;[data-topic]&#x27;).forEach((item) =&gt; item.setAttribute(&#x27;aria-pressed&#x27;, String(item === button)));
        });
      });

      root.querySelector(&#x27;#echo-favorite-btn&#x27;).addEventListener(&#x27;click&#x27;, (event) =&gt; {
        favorite = !favorite;
        event.currentTarget.setAttribute(&#x27;aria-pressed&#x27;, String(favorite));
        event.currentTarget.innerHTML = favorite ? &#x27;&lt;i data-lucide=&quot;bookmark-check&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; 已收藏&#x27; : &#x27;&lt;i data-lucide=&quot;bookmark&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt; 收藏&#x27;;
        if (window.lucide) window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
        saveState();
      });

      root.querySelector(&#x27;#echo-save-btn&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        const selected = root.querySelector(&#x27;input[name=&quot;echo-share&quot;]:checked&#x27;);
        toast.textContent = `已保存。当前分享范围：${selected ? selected.value : &#x27;仅自己可见&#x27;}。`;
        toast.classList.add(&#x27;is-visible&#x27;);
        saveState();
      });

      root.querySelectorAll(&#x27;[data-profile-feedback]&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; {
          profileFeedback = button.dataset.profileFeedback;
